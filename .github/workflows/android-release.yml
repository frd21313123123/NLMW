name: Android Release

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.event_name == 'pull_request' && github.ref || 'latest' }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.4"
  PROJECT_DIR: nlmw_flutter

jobs:
  build-and-release:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve build metadata
        id: build_meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "asset_suffix=build-${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Prepare Android SDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Generate local database code
        working-directory: ${{ env.PROJECT_DIR }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter analyze

      - name: Test
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter test

      - name: Build release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release

      - name: Prepare release asset
        id: release_asset
        env:
          ASSET_SUFFIX: ${{ steps.build_meta.outputs.asset_suffix }}
        run: |
          mkdir -p release
          cp "${PROJECT_DIR}/build/app/outputs/flutter-apk/app-release.apk" "release/nlmw-chat-${ASSET_SUFFIX}.apk"
          echo "name=nlmw-chat-${ASSET_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_asset.outputs.name }}
          path: release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: latest
          RELEASE_TITLE: "NLMW Chat build #${{ github.run_number }}"
          SHORT_SHA: ${{ steps.build_meta.outputs.short_sha }}
        run: |
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" >/dev/null 2>&1 || true
          gh release create "$RELEASE_TAG" release/*.apk \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "Automated APK build from ${GITHUB_REF_NAME} (${SHORT_SHA})." \
            --latest
