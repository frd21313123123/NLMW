name: Android Release

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.4"
  PROJECT_DIR: nlmw_flutter

jobs:
  build-and-release:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=build-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Android SDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Generate local database code
        working-directory: ${{ env.PROJECT_DIR }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter analyze

      - name: Test
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter test

      - name: Build release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release

      - name: Prepare release asset
        id: release_asset
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value || format('commit-{0}', github.sha) }}
        run: |
          mkdir -p release
          cp "${PROJECT_DIR}/build/app/outputs/flutter-apk/app-release.apk" "release/nlmw-chat-${RELEASE_TAG}.apk"
          echo "name=nlmw-chat-${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_asset.outputs.name }}
          path: release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: steps.release_tag.outputs.value != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          target_commitish: ${{ github.sha }}
          name: NLMW Chat ${{ steps.release_tag.outputs.value }}
          files: release/*.apk
          generate_release_notes: true
          prerelease: ${{ steps.release_tag.outputs.prerelease }}
          make_latest: ${{ steps.release_tag.outputs.make_latest }}
