<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Chat Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <!-- Desktop sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__logo">
          <svg class="sidebar__logoIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Chat Studio
        </div>
        <nav class="sidebar__nav">
          <button class="sidebar__item sidebar__item--active" id="sideChats" type="button">
            <svg viewBox="0 0 24 24"><path d="M3 9.5L12 4l9 5.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9" fill="var(--bg)"/></svg>
            <span>Чаты</span>
          </button>
          <button class="sidebar__item" id="sidePlus" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            <span>Создать персонажа</span>
          </button>
          <button class="sidebar__item" id="sideProfile" type="button">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
          </button>
        </nav>
      </aside>

      <!-- Main content area -->
      <div class="mainContent" id="mainContent">
      <header class="appbar" id="appbar">
        <!-- Chats view appbar -->
        <div class="appbar__row" id="appbarChats">
          <div class="search">
            <span class="search__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
            </span>
            <input class="search__input" id="chatSearch" type="search" placeholder="Поиск" />
          </div>
        </div>

        <!-- Chat view appbar -->
        <div class="appbar__row" id="appbarChat" hidden>
          <button class="iconBtn" id="btnBackToChats" type="button" aria-label="Назад">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <button class="chatTitle" id="btnOpenCharacters" type="button" aria-label="Персонаж">
            <img class="avatar" id="charAvatar" alt="" />
            <span class="chatTitle__text">
              <span class="chatTitle__name" id="charName"></span>
              <span class="chatTitle__meta" id="charMeta"></span>
            </span>
          </button>
          <div class="appbar__right">
            <select class="model__select model__select--compact" id="modelSelect" aria-label="Модель"></select>
            <button class="iconBtn" id="btnOpenPrompts" type="button" aria-label="Сохраненные промты" title="Сохраненные промты">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg>
            </button>
            <button class="iconBtn" id="btnClearChat" type="button" aria-label="Очистить чат">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
            </button>
          </div>
        </div>

        <!-- Profile view appbar -->
        <div class="appbar__row" id="appbarProfile" hidden>
          <div class="appbar__title">Профиль</div>
          <div class="appbar__right">
            <select class="model__select model__select--compact" id="modelSelectProfile" aria-label="Модель"></select>
          </div>
        </div>

        <div class="appbar__status" id="lmStatus" aria-live="polite"></div>
      </header>

      <main class="stage">
        <!-- Chat list -->
        <section class="view view--active" id="viewChats">
          <div class="chatList" id="chatList"></div>
        </section>

        <!-- Active chat -->
        <section class="view" id="viewChat">
          <div class="chat" id="chatPanel">
            <div class="chat__center">
              <div class="chat__messages" id="messages" role="log" aria-live="polite"></div>

              <form class="chat__composer" id="composerForm" autocomplete="off">
                <div class="composer__row">
                  <img class="avatar avatar--me" id="userAvatar" alt="" />
                  <textarea class="composer__input" id="userInput" rows="1" placeholder="Сообщение..."></textarea>
                  <button class="btn btn--accent btn--send" id="sendBtn" type="submit" aria-label="Отправить">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                  </button>
                </div>
                <div class="composer__hint" id="composerHint"></div>
              </form>
            </div>
            <div class="chat__rightPanel" id="chatRightPanel"></div>
          </div>
        </section>

        <!-- Profile -->
        <section class="view" id="viewProfile">
          <div class="panel panel--flat">
            <div class="panel__body">
              <div class="profile__card">
                <div class="profile__avatarRow">
                  <img class="avatar avatar--xl" id="userAvatarPreview" alt="" />
                  <div class="profile__avatarControls">
                    <label class="field">
                      <span class="field__label">Аватар (файл)</span>
                      <input class="field__input" id="userAvatarFile" type="file" accept="image/*" />
                    </label>
                    <label class="field">
                      <span class="field__label">Аватар (URL)</span>
                      <input class="field__input" id="userAvatarUrl" type="url" placeholder="https://..." />
                    </label>
                  </div>
                </div>

                <label class="field">
                  <span class="field__label">Имя</span>
                  <input class="field__input" id="userName" type="text" placeholder="Ваше имя" />
                </label>

                <label class="field">
                  <span class="field__label">Пол</span>
                  <select class="field__input" id="userGender">
                    <option value="unspecified">Не указывать</option>
                    <option value="female">Женский</option>
                    <option value="male">Мужской</option>
                    <option value="other">Другое</option>
                  </select>
                </label>

                <button class="btn btn--accent" id="btnSaveProfile" type="button">Сохранить профиль</button>
              </div>

              <div class="profile__card" style="margin-top: 1rem;">
                <div style="font-weight: 600; margin-bottom: 0.5rem; font-size: 0.95rem; color: rgba(255,255,255,0.7);">Провайдер LLM</div>

                <label class="field">
                  <span class="field__label">Источник моделей</span>
                  <select class="field__input" id="providerSelect">
                    <option value="lmstudio">LM Studio (локальный)</option>
                    <option value="mistral">Mistral (официальный API)</option>
                  </select>
                </label>

                <div id="mistralSettings" hidden>
                  <label class="field">
                    <span class="field__label">Mistral API Key</span>
                    <input class="field__input" id="mistralKeyInput" type="password" placeholder="mistral-..." autocomplete="off" />
                  </label>
                  <div style="font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 0.25rem;">
                    Ключ обязателен для доступа к Mistral API.
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <!-- Tab bar — 3 tabs -->
      <nav class="tabbar" aria-label="Навигация">
        <button class="tab" id="tabChats" type="button" aria-label="Чаты">
          <svg viewBox="0 0 24 24"><path d="M3 9.5L12 4l9 5.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9" fill="var(--bg)"/></svg>
        </button>
        <button class="tab tab--plus" id="tabPlus" type="button" aria-label="Персонажи">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
        <button class="tab" id="tabProfile" type="button" aria-label="Профиль">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </nav>

      </div><!-- /mainContent -->

      <!-- Characters modal -->
      <div class="modal" id="charactersModal" hidden>
        <div class="modal__overlay" data-close="1"></div>
        <div class="modal__window" role="dialog" aria-modal="true" aria-label="Персонажи">
          <div class="modal__header">
            <div class="modal__title">Персонажи</div>
            <div class="modal__headerActions">
              <button class="btn btn--ghost" id="btnImportCharacters" type="button">Импорт</button>
              <button class="btn btn--ghost" id="btnExportCharacters" type="button">Экспорт</button>
              <button class="btn btn--ghost" id="btnNewCharacter" type="button">Новый</button>
              <button class="btn" data-close="1" type="button">Закрыть</button>
            </div>
          </div>

          <div class="modal__content">
            <input id="importCharactersFile" type="file" accept="application/json,.json,image/png" hidden />
            <div class="importPanel">
              <div class="importPanel__row">
                <div class="importPanel__title">Импорт персонажа</div>
                <div class="importPanel__actions">
                  <button class="btn btn--ghost" id="btnImportPaste" type="button">Вставить</button>
                  <button class="btn btn--ghost" id="btnImportFilePick" type="button">Файл</button>
                  <button class="btn btn--accent" id="btnImportApply" type="button">Импортировать</button>
                </div>
              </div>
              <textarea
                class="field__input field__input--area"
                id="importTextInput"
                rows="3"
                placeholder="Вставьте ссылку PolyBuzz или JSON карточки персонажа"
              ></textarea>
              <div class="importPanel__note" id="importPanelNote">Поддерживается: ссылка polybuzz.ai, JSON, PNG character card.</div>
            </div>
            <div class="charList" id="charList"></div>

            <div class="charEditor">
              <form class="charForm" id="charForm">
                <div class="charHero" id="charHeroPreview">
                  <div class="charHero__topBar">
                    <button class="iconBtn charHero__icon" type="button" tabindex="-1" aria-hidden="true">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <div class="charHero__topActions">
                      <button class="iconBtn charHero__icon" type="button" tabindex="-1" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16v16H4z"/><path d="M8 8h8"/></svg>
                      </button>
                      <button class="iconBtn charHero__icon" type="button" tabindex="-1" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
                      </button>
                    </div>
                  </div>
                  <div class="charHero__content">
                    <img class="avatar avatar--xl charHero__avatar" id="charAvatarPreview" alt="" />
                    <div class="charHero__title" id="charHeroName">Новый персонаж</div>
                    <div class="charHero__subtitle" id="charHeroMeta">Заполните карточку персонажа</div>
                    <div class="charHero__tags">
                      <span class="chip" id="charHeroStyleTag">Стиль</span>
                      <span class="chip" id="charHeroGenderTag">Пол</span>
                    </div>
                    <div class="charHero__actions">
                      <button class="btn btn--accent charHero__chatBtn" id="btnUseCharacter" type="button">Чат</button>
                      <button class="btn btn--danger" id="btnDeleteCharacter" type="button">Удалить</button>
                    </div>
                  </div>
                </div>

                <div class="grid2">
                  <label class="field">
                    <span class="field__label">Имя персонажа</span>
                    <input class="field__input" id="charNameInput" type="text" placeholder="Например: Алиса" />
                  </label>
                  <label class="field">
                    <span class="field__label">Пол персонажа</span>
                    <select class="field__input" id="charGenderInput">
                      <option value="unspecified">Не указывать</option>
                      <option value="female">Женский</option>
                      <option value="male">Мужской</option>
                      <option value="other">Другое</option>
                    </select>
                  </label>
                </div>

                <div class="row row--genAvatar">
                  <button class="btn btn--accent btn--genAvatar" id="btnGenAvatar" type="button">Сгенерировать фото</button>
                  <span class="smallNote" id="genAvatarNote"></span>
                </div>

                <div class="grid2">
                  <label class="field">
                    <span class="field__label">Фото (файл)</span>
                    <input class="field__input" id="charAvatarFile" type="file" accept="image/*" />
                  </label>
                  <label class="field">
                    <span class="field__label">Фото (URL)</span>
                    <input class="field__input" id="charAvatarUrl" type="url" placeholder="https://..." />
                  </label>
                  <label class="field">
                    <span class="field__label">Фон чата (файл)</span>
                    <input class="field__input" id="charBgFile" type="file" accept="image/*" />
                  </label>
                  <label class="field">
                    <span class="field__label">Фон чата (URL)</span>
                    <input class="field__input" id="charBgUrl" type="url" placeholder="https://..." />
                  </label>
                </div>

                <label class="field">
                  <span class="field__label">Описание (одежда / внешность)</span>
                  <textarea class="field__input field__input--area" id="charOutfitInput" rows="3" placeholder="В чем он одет, детали внешности..."></textarea>
                </label>

                <label class="field">
                  <span class="field__label">Обстановка (сцена / место)</span>
                  <textarea class="field__input field__input--area" id="charSettingInput" rows="3" placeholder="Где происходит диалог, предметы вокруг..."></textarea>
                </label>

                <label class="field">
                  <span class="field__label">Фон для ИИ (коротко)</span>
                  <input class="field__input" id="charBgHintInput" type="text" placeholder="Например: ночной город, дождь, неон" />
                </label>

                <label class="field">
                  <span class="field__label">Предыстория (видна нейросети)</span>
                  <textarea class="field__input field__input--area" id="charBackstoryInput" rows="5" placeholder="Кто он, что пережил, мотивация..."></textarea>
                </label>

                <label class="field">
                  <span class="field__label">Стиль диалога</span>
                  <select class="field__input" id="charStyleInput"></select>
                </label>

                <label class="field">
                  <span class="field__label">Начальное сообщение</span>
                  <textarea class="field__input field__input--area" id="charInitialMessageInput" rows="3" placeholder="Первое сообщение персонажа..."></textarea>
                </label>

                <div class="row row--translate">
                  <button class="btn btn--accent" id="btnTranslateAll" type="button">↔ Перевести всё</button>
                  <span class="smallNote" id="charTranslateNote"></span>
                </div>

                <div class="row row--actions">
                  <button class="btn btn--accent" id="btnSaveCharacter" type="submit">Сохранить</button>
                  <button class="btn" type="button" disabled>Действия чата в превью</button>
                </div>

                <div class="smallNote" id="charFormNote"></div>
              </form>
            </div>
          </div>
        </div>
      </div>


      <!-- Saved prompts sheet -->
      <div class="sheet" id="promptsSheet" hidden>
        <div class="sheet__overlay" data-close-prompts="1"></div>
        <div class="sheet__panel" role="dialog" aria-modal="true" aria-label="Сохраненные промты">
          <div class="sheet__title">Сохраненные промты</div>
          <div class="promptManager">
            <div class="promptManager__create">
              <label class="field">
                <span class="field__label">Название</span>
                <input class="field__input" id="promptTitleInput" type="text" maxlength="80" placeholder="Например: Промт для ролевой сцены" />
              </label>
              <label class="field">
                <span class="field__label">Текст промта</span>
                <textarea class="field__input field__input--area" id="promptTextInput" rows="4" maxlength="4000" placeholder="Введите текст промта..."></textarea>
              </label>
              <div class="row row--actions">
                <button class="btn btn--accent" id="btnSavePrompt" type="button">Сохранить промт</button>
                <button class="btn btn--ghost" id="btnClearPromptDraft" type="button">Очистить</button>
              </div>
              <div class="smallNote" id="promptSheetNote"></div>
            </div>
            <div class="promptManager__list" id="savedPromptsList"></div>
          </div>
          <div class="sheet__buttons">
            <button class="btn btn--ghost" data-close-prompts="1" type="button">Закрыть</button>
          </div>
        </div>
      </div>
      <!-- Message actions sheet -->
      <div class="sheet" id="msgActions" hidden>
        <div class="sheet__overlay" data-close="1"></div>
        <div class="sheet__panel" role="dialog" aria-modal="true" aria-label="Действия с сообщением">
          <div class="sheet__title" id="msgActionsTitle">Сообщение</div>
          <div class="sheet__buttons">
            <button class="btn" id="btnMsgEdit" type="button">Редактировать</button>
            <button class="btn btn--danger" id="btnMsgDelete" type="button">Удалить</button>
            <button class="btn btn--ghost" data-close="1" type="button">Отмена</button>
          </div>
          <div class="sheet__note">Зажмите сообщение, чтобы открыть это меню.</div>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
